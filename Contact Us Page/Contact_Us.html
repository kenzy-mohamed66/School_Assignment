<html lang="ar" dir="ltr">

    <meta charset="UTF-8" />

    <link rel="stylesheet" href="Contact_Us.css" />
    <link rel="stylesheet" href="../Global.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <nav class="nav">
      <strong class="logo">EduTask</strong> |
      <a class="middle" href="../admin dashboard/index.html">Dashboard</a>
      <a class="middle" href="../admin dashboard/add-task.html">Add Task</a>

      <a class="middle" href="../Profile Page/Profile.html">profile</a>

      <span class="user-info">
        <a class="log" href="../SignUp_Login/Login.html">Logout</a>
      </span>
    </nav>

    <section class="contact-section">
      <div class="container">
        <div class="contact-form">
          <form>
            <div class="input-group">
              <label for="name">Name</label>
              <input
                id="name"
                name="name"
                type="text"
                placeholder="Your Name"
                required
              />
            </div>

            <div class="row">
              <div class="input-group">
                <label for="email">Email</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="Email Address"
                  required
                />
              </div>
              <div class="input-group">
                <label for="phone">Phone Number</label>
                <input
                  id="phone"
                  name="phone"
                  type="tel"
                  placeholder="Phone Number"
                  required
                />
              </div>
            </div>

            <div class="input-group">
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                rows="5"
                placeholder="Write your message..."
                required
              ></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit</button>
          </form>
        </div>

        <div class="contact-info">
          <h1>Contact <span class="highlight">Us</span></h1>
          <p>
            For questions, technical assistance, or collaboration opportunities
            via the contact information provided.
          </p>

          <div class="info-item">
            <i class="fas fa-phone"></i>
            <span>+923416587035</span>
          </div>
          <div class="info-item">
            <i class="fas fa-envelope"></i>
            <span>Ishamsaleem@hmsblogs.com</span>
          </div>
          <div class="info-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>Punjab, Pakistan</span>
          </div>
        </div>
      </div>
    </section>
    <script src="Contact_Us.js"></script>
  </body>
</html>
