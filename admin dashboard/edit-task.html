<h1 class="head-h1">Edit Task</h1>
  <div class="form-container">

    <form onsubmit="updateTask(event)">
      <h1 class="h1">SELECT A TASK TO EDIT</h1>

      <!--Task Dropdown -->
      <label class="l2">Select Task</label>
      <select id="task-select" class="select" onchange="onTaskSelected()">
        <option value="">-- Select a Task --</option>
      </select>

      <!-- Fields auto-filled after selection -->
      <label class="l2">Task Title</label>
      <input id="title" class="form-input" type="text" placeholder="Task title">

      <label class="l2">Teacher Name</label>
      <input id="teacher_name" class="form-input" type="text" placeholder="Assigned teacher">

      <label class="l2">Course</label>
      <input id="course" class="form-input" type="text" placeholder="Course">

      <label class="l2">Priority</label>
      <select id="priority" class="select">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <label class="l2">Description</label>
      <textarea id="description" class="form-input" placeholder="Task description"></textarea>

      <label class="l2">Due Date</label>
      <input id="due_date" class="form-input" type="date">

      <label class="l2">Status</label>
      <select id="status" class="select">
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
      </select>

      <input type="submit" value="Save Changes" id="submitBtn">
      <input type="reset" value="Clear Form" onclick="clearform()">
      <a href="index.html"><input type="button" value="Cancel"/></a>
    </form>
  </div>

  <script src="edit_task.js"></script>
</body>
