<!DOCTYPE html>
<html lang="eng">

    <head>
        <meta charset="UTF-8">
        <title> Login </title>
        <link rel="stylesheet" href="Home-pageStyle.css">
        <link rel="stylesheet" href="../Global.css">
    </head>

<body>
    <div class="main-container">

        <div class="form-box">

            <h1> Login </h1>

            <form action="..//html/index.html" method="post"> 
                <!--Username-->
                <div class="inputs">
                <input type="text" id="username" name="username" placeholder="Username" required>
                </div>

                <!--Password-->
                <div class="inputs">
                <input type="password" id="password" name="password" placeholder="Password" required>
                </div>

                <br>
                
                <!-- <button type="submit"> Login In </button> -->
                <div class="buttons">
                    <input class="btn" type="submit" formaction="..//html/index.html" value="Login as Admin">
                    <input class="btn" type="submit" formaction="../kenzy's tasks/teacher dashboard.html" value="Login as Teacher">
                </div>
            </form>

            <p class="link">
                Do not have an account?
                <br>
                <a href="index.html"> Sign up Here </a>
            </p>

        </div>

        <div class="image-box"> </div>

    </div>

</body>
</html>
