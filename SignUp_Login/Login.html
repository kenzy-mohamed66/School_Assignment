<!DOCTYPE html>
<html lang="eng">

    <head>
        <meta charset="UTF-8">
        <title> Login </title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="login.css">
        <link rel="stylesheet" href="../Global.css">
    </head>

<body>

    <div class="main-container">

        <div class="form-box">

            <h1> Login </h1>

            <form id="login-form" action="javascript:void(0);" method="post"> 
                <!--Username-->
                <div class="inputs">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Username" required>
                </div>

                <!--Password-->
                <div class="inputs">
                <i class="fas fa-eye"></i>
                <input type="password" id="password" placeholder="Password" required>
                </div>
                
                <div class="buttons">
                    <input class="btn" type="submit" value="Login">
                </div>

                <!-- Forgot Password Link -->
                 <p class="link">
                    <a href="#" onclick="showForgotPassword()">Forgot Password?</a>
                </p>

            </form>

            <!-- Forgot Password Form (hidden by default) -->
            <div id="forgot-form" style="display:none;">
                <h1>Reset Password</h1>
                <div class="inputs">
                    <i class="fas fa-user"></i>
                    <input type="text" id="reset-username" placeholder="Enter your username">
                </div>
                <div class="inputs">
                    <i class="fas fa-eye"></i>
                    <input type="password" id="reset-password" placeholder="Enter new password">
                </div>
                <div class="buttons">
                    <input class="btn" type="button" value="Reset Password" onclick="resetPassword()">
                </div>
                <p class="link">
                    <a href="Login.html" onclick="showLogin()">Back to Login</a>
                </p>
            </div>

            <p class="link">
                Do not have an account?
                <br>
                <a href="index.html"> Sign up Here </a>
            </p>

        </div>

        <div class="image-box"> </div>

    </div>

<script src="Sign-Login.js"></script>

</body>
</html>
