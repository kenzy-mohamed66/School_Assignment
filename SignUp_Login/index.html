<!DOCTYPE html>
<html lang="eng">

    <head>
        <meta charset="UTF-8">
        <title> Sign Up </title>
        <link rel="stylesheet" href="Home-pageStyle.css">
        <link rel="stylesheet" href="../Global.css">
    </head>

<body>
    <div class="main-container">
        <div class="form"> 
            <h1> Welcome To Our School Task Manager </h1>
            <p> Please Sign Up To Create An Account </p>
            <form action="../html/index.html" method="post">
                <!--Username-->
                <div>
                    <label for="username"> Username: </label>
                    <br>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <!--Email-->
                <div>
                    <label for="email"> Email: </label>
                    <br>
                    <input type="text" id="email" name="email" required>
                </div>

                <!--Password-->
                <div>
                    <label for="password"> Password: </label>
                    <br>
                    <input type="password" id="password" name="password" required>
                </div>

                <!--Confirm password-->
                <div>
                    <label for="confirm password"> Confirm Password: </label>
                    <br>
                    <input type="password" id="confirm password" name="confirm password" required>
                </div>
                <br>
                <!-- <button type="submit"> Sign Up </button> -->
                <div>
                    <input type="submit" formaction="..//html/index.html" value="Sign-up as Admin">
                    <input type="submit" formaction="../kenzy's tasks/teacher dashboard.html" value="Sign-up as Teacher">
                </div>

            </form>

            <p>
                Already Have An Account?
                <br>
                <a href="Login.html"> Login Here </a>
            </p>
