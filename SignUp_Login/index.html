<!DOCTYPE html>
<html lang="eng">

    <head>
        <meta charset="UTF-8">
        <title> Sign Up </title>
    </head>

<body>
    <h1> Sign Up </h1>

    <form action="..//html/index.html" method="post">
        <!--Username-->
        <div>
            <label for="username"> Username: </label>
            <br>
            <input type="text" id="username" name="username" required>
        </div>

        <!--Email-->
        <div>
            <label for="email"> Email: </label>
            <br>
            <input type="text" id="email" name="email" required>
        </div>

        <!--Password-->
        <div>
            <label for="password"> Password: </label>
            <br>
            <input type="password" id="password" name="password" required>
        </div>

        <!--Confirm password-->
        <div>
            <label for="confirm password"> Confirm Password: </label>
            <br>
            <input type="password" id="confirm password" name="confirm password" required>
        </div>

        <!--User Role-->
        <div>
            <label for="signup_role"> Register as: </label>
            <br>
            <select id="signup_role" name="is_admin" required>
                <option value="" disabled selected> Select Your Role </option>
                <option value="true"> Admin </option>
                <option value="false"> Teacher </option>
            </select>
        </div>

        <br>

        <!-- <button type="submit"> Sign Up </button> -->
        <input type="submit" formaction="..//html/index.html" value="Sign-up as Admin">

        <input type="submit" formaction="..//kenzy's tasks/teacher dashboard.html" value="Sign-up as Teacher">
    </form>
    <p>
        Already Have An Account?
        <a href="Login.html"> Login Here </a>
    </p>

</body>
</html>
