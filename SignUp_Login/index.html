<!DOCTYPE html>
<html lang="eng">

    <head>
        <meta charset="UTF-8">
        <title> Sign Up </title>
        <link rel="stylesheet" href="Home-pageStyle.css">
        <link rel="stylesheet" href="../Global.css">
    </head>

<body>
    <div class="main-container">

        <div class="form-box"> 

            <h1> Create An Account </h1>
            
            <form action="../html/index.html" method="post">

                <!--Username-->
                <div class="inputs">
                    <input type="text" id="username" name="username" placeholder="Username" required>
                </div>
                
                <!--Email-->
                <div class="inputs">
                    <input type="text" id="email" name="email" placeholder="Email" required>
                </div>

                <!--Password-->
                <div class="inputs">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>

                <!--Confirm password-->
                <div class="inputs">
                    <input type="password" id="confirm password" name="confirm password" placeholder="Confirm Password" required>
                </div>

                <br>

                <!-- <button type="submit"> Sign Up </button> -->
                <div class="buttons">
                    <input class="btn" type="submit" formaction="..//html/index.html" value="Sign-up as Admin">
                    <input class="btn" type="submit" formaction="../kenzy's tasks/teacher dashboard.html" value="Sign-up as Teacher">
                </div>

            </form>

            <p class="link">
                Already Have An Account?
                <br>
                <a href="Login.html"> Login Here </a>
            </p>

        </div>

        <div class="image-box"> </div>

    </div>

</body>
</html>
