<!DOCTYPE html>
<html>
    <head>
           <meta charset="UTF-8">
       <title>teacher dashboard</title>
       <link rel ="stylesheet" href ="../global.css">
              <link rel ="stylesheet" href ="./style.css">

    </head>
    <body>
        

<nav class="nav">
  
  <strong class="logo">EduCore</strong>|
  
  <a class="middle" href="teacher_dashboard.html">Dashboard</a>
  <a class="middle" href="task_details.html" class="active">Task Details</a>
  <a class="middle" href="../Completed Tasks/assignment.html">Completed Tasks</a>
  <a class="middle" href="../HOME_PAGE/HOME.html">Home</a>
  <a class="middle" href="../Contact Us Page/Contact_Us.html"> Contact</a>
  <a class="middle" href="../About_us/about_us.html">About Us</a>
  <a class="middle" href="../Profile Page/Profile.html">profile</a>

  <span class="user-info">
    Logged in as: <strong id="nav-username">Teacher: ...</strong>

    <a class="log" href="../SignUp_Login/Login.html">Logout</a>
  </span>

</nav>      
 
<main>
  <div class="page-header">
<h1 id="welcome-msg">Welcome, Teacher</h1>
    <p>Manage and track all assigned tasks below.</p>
  </div>
  <hr>
 
  <!-- Filter Bar -->
  <div class="filter-bar">
    <h3>Filter</h3>
    <div class="filter-group">
      <label for="priority">Priority:</label>
      <select id="priority" onchange="filterTable()">
        <option value="all">All</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="Subjects">Subject:</label>
      <!-- ✅ Empty - filled by JS -->
        <select id="Subjects" onchange="filterTable()">
        <option value="all">All</option>
</select>
    </div>
  </div>
 
  <!-- Tasks Table -->
  <div class="table-wrap">
    <table id="taskTable">
      <thead>
        <tr>
          <th>Subject</th>
          <th>Priority</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="task-tbody">
    <!-- filled by JS -->
      </tbody>
    </table>
  </div>
</main>
 
<!-- Shared Modal -->
<div class="modal-overlay" id="modal" onclick="handleOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-subject-label">Task Details</div>
        <h2 id="modal-title"></h2>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-row">
        <span class="modal-label">Priority</span>
        <span class="modal-value" id="modal-priority"></span>
      </div>
      <div class="modal-row">
        <span class="modal-label">Status</span>
        <span class="modal-value" id="modal-status"></span>
      </div>
      <div class="modal-row">
        <span class="modal-label">Assigned To</span>
        <span class="modal-value" id="modal-student"></span>
      </div>
      <div class="modal-row">
        <span class="modal-label">Description</span>
      </div>
      <div class="modal-desc" id="modal-desc"></div>
    </div>
    <div class="modal-footer">
      <label>
        <input type="checkbox" id="modal-complete"> Mark as Completed
      </label>
      <button class="btn-save" onclick="saveStatus()">Save Status</button>
    </div>
  </div>
</div>
 
<script src="motion.js"></script>
<script>
    const username = localStorage.getItem('username') || 'Teacher';
    const role     = localStorage.getItem('role') || 'teacher';
    document.getElementById('nav-username').textContent = role.charAt(0).toUpperCase() + role.slice(1) + ': ' + username;
    document.getElementById('welcome-msg').textContent  = 'Welcome, ' + username;
</script>
</body>
</html>
